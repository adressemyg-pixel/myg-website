kind = "web"
previewPath = "/"
title = "MYG — Moroccan Youth Governance"
version = "1.0.0"
id = "artifacts/myg-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23945

[services.development]
run = "pnpm --filter @workspace/myg-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/myg-website", "run", "build" ]
publicDir = "artifacts/myg-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23945"
BASE_PATH = "/"
