[build]
  command = "pnpm --filter @workspace/myg-website run build:netlify"
  publish = "artifacts/myg-website/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# Route all /api/* calls to netlify functions
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true

[[redirects]]
  from = "/api/brochures"
  to = "/.netlify/functions/brochures"
  status = 200
  force = true

[[redirects]]
  from = "/api/brochures/*"
  to = "/.netlify/functions/brochures"
  status = 200
  force = true

[[redirects]]
  from = "/api/healthz"
  to = "/.netlify/functions/health"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
